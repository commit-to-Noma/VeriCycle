services:
  - type: web
    name: vericycle
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 3 --timeout 120 --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEMO_MODE
        value: "1"
      - key: NETWORK
        value: testnet
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: HEDERA_ACCOUNT_ID
        sync: false
      - key: HEDERA_PRIVATE_KEY
        sync: false
      - key: VERICYCLE_TOPIC_ID
        sync: false
      - key: ECOCOIN_TOKEN_ID
        sync: false
      - key: ECOCOIN_TREASURY_ID
        sync: false
      - key: ECOCOIN_TREASURY_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
