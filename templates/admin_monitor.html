<!DOCTYPE html>
<html>
<head>

<title>VeriCycle Admin Monitor</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body {

font-family: Arial;

background: #0b0f14;

color: white;

padding: 20px;

}

.card {

background: #151b22;

padding: 15px;

margin-bottom: 15px;

border-radius: 8px;

}

button {

background: #2ecc71;

border: none;

padding: 8px;

cursor: pointer;

}

.verify-badge {
display: inline-block;
padding: 4px 8px;
border-radius: 6px;
font-size: 12px;
font-weight: 700;
margin-left: 10px;
}

.verify-badge.ok {
background: #0b6623;
color: #ffffff;
}

.verify-badge.bad {
background: #B71C1C;
color: #ffffff;
}

.decision-feed {
background: #0f141b;
border: 1px solid #2a3340;
border-radius: 6px;
padding: 10px;
max-height: 220px;
overflow-y: auto;
font-size: 12px;
}

.decision-item {
padding: 6px 0;
border-bottom: 1px solid #1f2833;
}

.decision-item.info {
color: #c7d2e1;
}

.decision-item.warn {
color: #f9c27a;
}

.decision-item.error {
color: #ff9aa2;
}

.decision-item:last-child {
border-bottom: none;
}

a {

color: #58a6ff;

}

</style>

</head>

<body>

<h1>VeriCycle Admin Monitor</h1>

<p>
	<a href="/collector">Back to Collector</a> |
	<a href="/home">Home</a>
</p>

<div class="card" id="demoModeCard">Demo Mode: ...</div>

<div class="card" id="queue-summary">Queue: loading...</div>

<button id="createDemoDepositBtn" style="margin:8px 0;">Create Demo Deposit</button>

<form method="post" action="/admin/cleanup-stale-running" style="margin:8px 0;">
	<button type="submit">Mark Running as Failed</button>
</form>

<label style="display:block;margin:10px 0;">
	<input type="checkbox" id="showFailed" />
	Show failed tasks
</label>

<label style="display:block;margin:10px 0;">
	<input type="checkbox" id="showDebug" />
	Debug details
</label>

<label style="display:block;margin:10px 0;">
	Date Range:
	<select id="dateRange" style="margin-left:8px;">
		<option value="today">Today</option>
		<option value="7d">Last 7 days</option>
		<option value="all" selected>All</option>
	</select>
</label>

<div id="autoVerifyStatus" class="card" style="margin-top:8px;color:#9ad7a6;font-weight:600;">Auto-verify pending...</div>

<div id="activities"></div>
<div id="activity-controls" class="card" style="display:none;"></div>

<script>

let demoMode = false;
const ACTIVITY_PAGE_SIZE = 8;
let visibleActivityCount = ACTIVITY_PAGE_SIZE;
const DATE_RANGE_STORAGE_KEY = "vericycle_admin_date_range";

function restoreDateRangeSelection() {
	const select = document.getElementById("dateRange");
	if (!select) return;
	const saved = localStorage.getItem(DATE_RANGE_STORAGE_KEY);
	if (saved && ["today", "7d", "all"].includes(saved)) {
		select.value = saved;
	}
}

function activityInRange(activity, range) {
	if (range === "all") return true;
	const timeValue = new Date(activity?.timestamp || "").getTime();
	if (Number.isNaN(timeValue)) return false;

	const now = new Date();
	if (range === "today") {
		const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
		return timeValue >= startOfDay;
	}
	if (range === "7d") {
		const sevenDaysAgo = now.getTime() - (7 * 24 * 60 * 60 * 1000);
		return timeValue >= sevenDaysAgo;
	}
	return true;
}

fetch("/api/config")
	.then(r => r.json())
	.then(cfg => {
		demoMode = !!(cfg && cfg.demo_mode);
		const el = document.getElementById("demoModeCard");
		el.innerText = "Demo Mode: " + (demoMode ? "ON" : "OFF");
	})
	.catch(() => {
		const el = document.getElementById("demoModeCard");
		el.innerText = "Demo Mode: unknown";
	});

function loadQueueSummary() {
	fetch("/api/admin/queue")
		.then(r => r.json())
		.then(q => {
			const el = document.getElementById("queue-summary");
			el.innerHTML = `
				<h3>Queue Summary</h3>
				<p>Queued: ${q.queued ?? 0} | Running: ${q.running ?? 0} | Failed: ${q.failed ?? 0} | Done: ${q.done ?? 0}</p>
			`;
		})
		.catch(() => {
			const el = document.getElementById("queue-summary");
			el.innerHTML = "<h3>Queue Summary</h3><p>Unable to load queue state.</p>";
		});
}

loadQueueSummary();

function normalizeStatusLabel(value) {
	const status = (value || "").toString().trim();
	if (!status) return status;
	const lower = status.toLowerCase();
	const normalized = lower.replace(/[_\s-]+/g, " ");
	if (normalized.includes("pending") && normalized.includes("hedera")) {
		return "Hedera delayed (retry)";
	}
	return status;
}

let adminActivities = [];
let proofVerifyCache = new Map();

function paintProofStatus(id, result) {
	const el = document.getElementById("proof_" + id);
	if (!el) return;
	if (result === "verified") {
		el.textContent = "Proof hash OK";
		el.className = "verify-badge ok";
		return;
	}
	if (result === "mismatch") {
		el.textContent = "Proof hash MISMATCH";
		el.className = "verify-badge bad";
		return;
	}
	if (result === "failed") {
		el.textContent = "Proof verify failed";
		el.className = "verify-badge bad";
		return;
	}
	el.textContent = "Proof verify error";
	el.className = "verify-badge bad";
}

function restoreProofStatusesFromCache() {
	proofVerifyCache.forEach((value, id) => {
		paintProofStatus(id, value);
	});
}

function renderActivities(data) {
	const container = document.getElementById("activities");
	const controls = document.getElementById("activity-controls");
	if (!container) return;
	container.innerHTML = "";
	if (controls) {
		controls.style.display = "none";
		controls.innerHTML = "";
	}

	if (!data || data.length === 0) {
		container.innerHTML = "<div class='card'><p>No activities yet. Create a deposit from /collector, then refresh.</p></div>";
		return;
	}

	const showFailed = document.getElementById("showFailed")?.checked;
	const showDebug = document.getElementById("showDebug")?.checked;
	const dateRange = document.getElementById("dateRange")?.value || "all";

	const sorted = [...data].sort((left, right) => {
		const leftTs = new Date(left?.timestamp || "").getTime();
		const rightTs = new Date(right?.timestamp || "").getTime();
		const leftSafe = Number.isNaN(leftTs) ? 0 : leftTs;
		const rightSafe = Number.isNaN(rightTs) ? 0 : rightTs;
		if (rightSafe !== leftSafe) return rightSafe - leftSafe;
		return (Number(right?.id) || 0) - (Number(left?.id) || 0);
	});

	const filtered = sorted.filter(a => {
		const tasks = Array.isArray(a.tasks) ? a.tasks : [];
		const hasFailedTask = tasks.some(t => (t.status || "").toLowerCase() === "failed");
		if (!(showFailed || !hasFailedTask)) return false;
		return activityInRange(a, dateRange);
	});

	const visible = filtered.slice(0, visibleActivityCount);

	visible.forEach(a => {
		const tasks = Array.isArray(a.tasks) ? a.tasks : [];

		const parsedTime = new Date(a.timestamp);
		const exactTime = Number.isNaN(parsedTime.getTime())
			? (a.timestamp || "Unknown")
			: parsedTime.toLocaleString([], {
				year: "numeric",
				month: "2-digit",
				day: "2-digit",
				hour: "2-digit",
				minute: "2-digit",
				second: "2-digit",
				hour12: false
			});

		let html = `
		<div class="card">
		<h3>Deposit ${a.id}</h3>
		<p>Deposit: ${a.desc || "Not specified"}</p>
		<p>Amount: ${a.amount}</p>
		<p>Date/Time: ${exactTime}</p>
		`;

		const logbookStatus = (a.logbook_status || "").toString().toLowerCase();
		const rewardStatus = (a.reward_status || "").toString().toLowerCase();
		const collectorDone = tasks.some(t => t.agent === "CollectorAgent" && (t.status || "").toLowerCase() === "done");
		const verifierDone = tasks.some(t => t.agent === "VerifierAgent" && (t.status || "").toLowerCase() === "done");
		const rewardDone = tasks.some(t => t.agent === "RewardAgent" && (t.status || "").toLowerCase() === "done");

		let logbookFlow = "⏳ Pending";
		if (logbookStatus === "anchored") logbookFlow = "✅ Final (Anchored)";
		else if (logbookStatus === "offchain_final") logbookFlow = "✅ Final (Off-chain)";
		else if (logbookStatus === "demo_skipped") logbookFlow = "✅ Final (Demo skipped)";
		else if (logbookStatus === "failed") logbookFlow = "❌ Failed";

		html += `<p>
		Collector ${collectorDone ? "✅" : "⏳"} |
		Verifier ${verifierDone ? "✅" : "⏳"} |
		Logbook ${logbookFlow} |
		Reward ${rewardDone ? "✅" : "⏳"}
		</p>`;

		if (a.hedera_tx_id) {
			html += `<p>
			On-chain anchor: Anchored ·
			<a href="https://hashscan.io/testnet/transaction/${a.hedera_tx_id}" target="_blank">
			View on Hedera
			</a>
			<button style="margin-left:10px" onclick="verifyMirror(${a.id})">Verify on Mirror</button>
			<span id="mirror_${a.id}" style="margin-left:10px"></span>
			</p>`;
		} else if (logbookStatus === "demo_skipped") {
			html += `<p>On-chain anchor: Demo skipped</p>`;
		} else if (logbookStatus === "offchain_final") {
			html += `<p>On-chain anchor: Pending/Unavailable</p>
			<button onclick="retry(${a.id})">Retry Hedera Log</button>`;
			if (showDebug && a.logbook_last_error) {
				html += `<p style="color:#f9c27a;">Debug: ${a.logbook_last_error}</p>`;
			}
		} else if (logbookStatus === "failed") {
			html += `<p>On-chain anchor: Failed</p>
			<button onclick="retry(${a.id})">Retry Hedera Log</button>`;
			if (showDebug && a.logbook_last_error) {
				html += `<p style="color:#f9c27a;">Debug: ${a.logbook_last_error}</p>`;
			}
		} else if (demoMode && (!logbookStatus || logbookStatus === "pending")) {
			html += `<p>On-chain anchor: Processing...</p>`;
		} else {
			html += `<p>On-chain anchor: Pending/Unavailable</p>
			<button onclick="retry(${a.id})">Retry Hedera Log</button>`;
		}

		if (rewardStatus === "paid" && a.reward_tx_id) {
			html += `<p>
			Reward transfer: Complete ·
			<a href="https://hashscan.io/testnet/transaction/${a.reward_tx_id}" target="_blank">
			View Reward TX
			</a>
			</p>`;
		} else if (rewardStatus === "finalized_no_transfer") {
			html += `<p>Reward: Finalized (no transfer)</p>`;
			if (showDebug && a.reward_last_error) {
				html += `<p style="color:#f9c27a;">Debug: ${a.reward_last_error}</p>`;
			}
		} else if (rewardDone) {
			html += `<p>Reward: Pending</p>`;
		}

		html += `<p>
		<button style="margin-top:10px" onclick="verifyProof(${a.id})">Verify Proof Hash</button>
		<button style="margin-top:10px;margin-left:10px" onclick="regenerateProof(${a.id})">Regenerate Proof Bundle</button>
		<span id="proof_${a.id}" style="margin-left:10px"></span>
		</p>`;

		html += `<h4>Agent Pipeline</h4>`;
		tasks.forEach(t => {
			const label = normalizeStatusLabel(t.status);
			html += `<p>${t.agent} : ${label}${showDebug && t.error ? ` (${t.error})` : ""}</p>`;
		});

		html += `<h4>Agent Decision Feed</h4>
		<p style="margin:0 0 8px 0; color:#a8b3c2;">Chronological reasons and stage transitions</p>
		<div id="feed_${a.id}" class="decision-feed">Loading decisions...</div>
		<p style="margin-top:8px;"><button onclick="refreshFeed(${a.id})">Refresh Feed</button></p>`;

		html += "</div>";
		container.innerHTML += html;
		loadDecisionFeed(a.id);
	});

	if (controls) {
		const remaining = Math.max(0, filtered.length - visible.length);
		const shownText = `Showing ${visible.length} of ${filtered.length} transactions (newest first)`;
		if (remaining > 0) {
			controls.style.display = "block";
			controls.innerHTML = `<p style="margin:0 0 8px 0;">${shownText}</p>
			<button onclick="loadMoreActivities()">Load older transactions (${remaining} remaining)</button>`;
		} else if (filtered.length > ACTIVITY_PAGE_SIZE) {
			controls.style.display = "block";
			controls.innerHTML = `<p style="margin:0;">${shownText}</p>`;
		}
	}
}

function loadMoreActivities() {
	visibleActivityCount += ACTIVITY_PAGE_SIZE;
	renderActivities(adminActivities);
	restoreProofStatusesFromCache();
	runAutoVerify();
}

function formatFeedTimestamp(value) {
	if (!value) return "Unknown time";
	const parsed = new Date(value);
	if (Number.isNaN(parsed.getTime())) return value;
	return parsed.toLocaleString();
}

function loadDecisionFeed(activityId) {
	const target = document.getElementById(`feed_${activityId}`);
	if (!target) return;
	target.textContent = "Loading decisions...";

	fetch(`/api/admin/activity-events/${activityId}`)
		.then(async r => {
			if (!r.ok) {
				const payload = await r.json().catch(() => ({}));
				throw payload;
			}
			return r.json();
		})
		.then(payload => {
			const events = Array.isArray(payload?.events) ? payload.events : [];
			if (!events.length) {
				target.innerHTML = "No decisions yet.";
				return;
			}

			target.innerHTML = events.map(e => {
				const levelRaw = (e.level || "info").toString().toLowerCase();
				const level = levelRaw.toUpperCase();
				const levelClass = (levelRaw === "error" || levelRaw === "failed")
					? "error"
					: ((levelRaw === "warn" || levelRaw === "warning") ? "warn" : "info");
				const when = formatFeedTimestamp(e.created_at);
				const stage = e.pipeline_stage ? ` · stage=${e.pipeline_stage}` : "";
				const tx = e.tx_id ? ` · tx=${e.tx_id}` : "";
				const err = e.last_error ? ` · error=${e.last_error}` : "";
				const details = document.getElementById("showDebug")?.checked ? `${tx}${err}` : "";
				return `<div class="decision-item ${levelClass}">[${when}] <strong>${e.agent || "Agent"}</strong> ${level}: ${e.message || ""}${stage}${details}</div>`;
			}).join("");
		})
		.catch(() => {
			target.textContent = "Unable to load decisions.";
		});
}

function refreshFeed(activityId) {
	loadDecisionFeed(activityId);
}

function runAutoVerify(data) {
	const status = document.getElementById("autoVerifyStatus");
	const proofIds = Array.from(document.querySelectorAll("span[id^='proof_']"))
		.map(el => Number((el.id || "").replace("proof_", "")))
		.filter(id => Number.isFinite(id));

	if (!proofIds.length) {
		if (status) status.innerText = "Auto-verify complete: no activities";
		return;
	}

	if (status) status.innerText = "Auto-verify running...";

	let okCount = 0;
	let badCount = 0;

	Promise.all(proofIds.map(id => {
		return fetch("/api/proof-bundle/" + id)
			.catch(() => null)
			.then(() => verifyProof(id, true))
			.then(result => {
			if (result === "verified") okCount++;
			else badCount++;
		});
	})).then(() => {
		if (status) status.innerText = `Auto-verify complete: ${okCount} verified, ${badCount} issues`;
	});
}

function loadActivities() {
	fetch("/api/admin/activities")
		.then(r => r.json())
		.then(data => {
			adminActivities = Array.isArray(data) ? data : [];
			visibleActivityCount = ACTIVITY_PAGE_SIZE;
			renderActivities(adminActivities);
			runAutoVerify();
			loadQueueSummary();
		})
		.catch(() => {
			const container = document.getElementById("activities");
			if (container) {
				container.innerHTML = "<div class='card'><p>Unable to load activities.</p></div>";
			}
			const status = document.getElementById("autoVerifyStatus");
			if (status) status.innerText = "Auto-verify error";
		});
}

document.getElementById("showFailed").addEventListener("change", () => {
	renderActivities(adminActivities);
	restoreProofStatusesFromCache();
	runAutoVerify();
});

document.getElementById("showDebug").addEventListener("change", () => {
	renderActivities(adminActivities);
	restoreProofStatusesFromCache();
	runAutoVerify();
});

document.getElementById("dateRange").addEventListener("change", () => {
	localStorage.setItem(DATE_RANGE_STORAGE_KEY, document.getElementById("dateRange")?.value || "all");
	visibleActivityCount = ACTIVITY_PAGE_SIZE;
	renderActivities(adminActivities);
	restoreProofStatusesFromCache();
	runAutoVerify();
});

restoreDateRangeSelection();

document.getElementById("createDemoDepositBtn").addEventListener("click", () => {
	const btn = document.getElementById("createDemoDepositBtn");
	if (btn) btn.disabled = true;
	fetch("/api/simulate-deposit", { method: "POST" })
		.then(() => {
			setTimeout(() => {
				loadActivities();
				if (btn) btn.disabled = false;
			}, 1200);
		})
		.catch(() => {
			if (btn) btn.disabled = false;
		});
});

loadActivities();


function retry(id){

fetch("/admin/retry-logbook/" + id, {
	method: "POST",
	headers: {
		"X-Requested-With": "XMLHttpRequest"
	}
})
	.then(() => {
		setTimeout(() => {
			loadActivities();
		}, 1000);
	});

}

function verifyMirror(id){
const el = document.getElementById("mirror_" + id);
if (!el) return;
el.innerText = "Checking...";

fetch("/api/mirror-verify/" + id)
	.then(async r => {
		if (r.ok) return r.json();
		const j = await r.json().catch(() => ({}));
		throw j;
	})
	.then(() => {
		el.innerText = "Verified on Hedera Mirror";
	})
	.catch(err => {
		if (err && err.status === "not_found_yet") el.innerText = "Not indexed yet (try again)";
		else if (err && err.status === "timeout") el.innerText = "Mirror timeout (try again)";
		else if (err && err.status === "request_exception") el.innerText = "Mirror request failed";
		else if (err && err.status === "http_error") el.innerText = "Mirror HTTP error";
		else if (err && err.error) el.innerText = "Mirror error: " + err.error;
		else el.innerText = "Mirror verify failed";
	});
}

function verifyProof(id, force = false){
const el = document.getElementById("proof_" + id);
if (!el) return Promise.resolve("error");

if (!force && proofVerifyCache.has(id)) {
	const cached = proofVerifyCache.get(id);
	paintProofStatus(id, cached);
	return Promise.resolve(cached);
}

el.textContent = "Checking...";
el.className = "";

const controller = new AbortController();
const timeoutMs = 10000;
const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

return fetch("/api/proof-verify/" + id, { signal: controller.signal })
	.then(async r => {
		clearTimeout(timeoutId);
		if (!r || !r.ok) {
			const j = r ? await r.json().catch(() => ({})) : {};
			throw j;
		}
		return r.json();
	})
	.then(data => {
		const match = !!(data && (data.match === true || data.hash_match === true));
		if (match) {
			proofVerifyCache.set(id, "verified");
			paintProofStatus(id, "verified");
			return "verified";
		}
		proofVerifyCache.set(id, "mismatch");
		paintProofStatus(id, "mismatch");
		return "mismatch";
	})
	.catch((err) => {
		clearTimeout(timeoutId);
		const result = err && err.name === "AbortError" ? "failed" : "error";
		proofVerifyCache.set(id, result);
		paintProofStatus(id, result);
		return result;
	});
}

function regenerateProof(id){
const el = document.getElementById("proof_" + id);
if (el) {
	el.textContent = "Regenerating...";
	el.className = "";
}

fetch("/api/proof-bundle/" + id)
	.then(r => {
		if (!r.ok) throw new Error("regen failed");
		return r.blob();
	})
	.then(() => verifyProof(id, true))
	.catch(() => {
		if (el) {
			el.textContent = "Proof regenerate failed";
			el.className = "verify-badge bad";
		}
	});
}

</script>

</body>
</html>
