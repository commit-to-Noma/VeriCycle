<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - VeriCycle</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="light-theme auth-page">
    <div class="auth-modal-backdrop" onclick="window.location.href='/home'">
        <div class="auth-card" onclick="event.stopPropagation()">
            <h2>Welcome Back</h2>
            <p class="auth-demo-hint">Choose a demo role and sign in instantly.</p>

            <div class="demo-credentials" aria-label="Demo credentials">
                <h3>Demo Accounts</h3>
                <div class="demo-credential-grid">
                    <button type="button" class="demo-credential-card" data-username="recycler1" data-password="1234">Recycler<br><small>username: recycler1 | password: 1234</small></button>
                    <button type="button" class="demo-credential-card" data-username="business1" data-password="1234">Business<br><small>username: business1 | password: 1234</small></button>
                    <button type="button" class="demo-credential-card" data-username="center1" data-password="1234">Center<br><small>username: center1 | password: 1234</small></button>
                    <button type="button" class="demo-credential-card" data-username="admin1" data-password="1234">Admin<br><small>username: admin1 | password: 1234</small></button>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-bar">
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">

                <input type="text" name="username" id="login-username" placeholder="Username" required>
                <input type="password" name="password" id="login-password" placeholder="Password" required>

                <button type="submit">Log In</button>
            </form>

            <p>
                Don't have an account?
                <a href="/signup">Create one</a>
            </p>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const usernameInput = document.getElementById('login-username');
        const passwordInput = document.getElementById('login-password');
        const demoCards = Array.from(document.querySelectorAll('.demo-credential-card'));

        demoCards.forEach((card) => {
            card.addEventListener('click', function () {
                if (!usernameInput || !passwordInput) return;
                usernameInput.value = card.dataset.username || '';
                passwordInput.value = card.dataset.password || '';
                usernameInput.focus();
            });
        });
    });
    </script>
</body>
</html>
